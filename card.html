<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(13, 110, 253, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            position: relative;
        }

        .navbar a::after {
            content: "";
            position: absolute;
            width: 0;
            height: 2px;
            background: white;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        .navbar a:hover::after {
            width: 100%;
        }

        .booking-section {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url("https://picsum.photos/1200/600?hotel");
            background-size: cover;
            background-position: center;
            padding: 80px 20px;
            border-radius: 20px;
        }

        .booking-box {
            max-width: 500px;
            margin: auto;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            animation: fadeUp 1.2s ease;
        }

        .booking-box h2 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 5px;
        }

        .sub-text {
            text-align: center;
            margin-bottom: 30px;
            color: #ddd;
        }

        .booking-form .input-group {
            margin-bottom: 20px;
        }

        .booking-form label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #eee;
        }

        .booking-form input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .input-row {
            display: flex;
            gap: 15px;
        }

        .book-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0d6efd, #00c6ff);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .book-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="booking.html">Rooms</a>
        <a href="card.html">Booking</a>
        <a href="contact.html">Contact</a>
        <a href="docter.html">Doctor</a>
    </nav>

    <div class="booking-section" id="booking">
        <div class="booking-box">
            <h2>Book Your Luxury Stay</h2>
            <p class="sub-text">Experience comfort & elegance</p>

            <form class="booking-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Check-in</label>
                        <input type="date" required>
                    </div>

                    <div class="input-group">
                        <label>Check-out</label>
                        <input type="date" required>
                    </div>
                </div>

                <button type="submit" class="book-btn">Confirm Booking</button>
            </form>
        </div>
    </div>

    </div>

    <div class </body>

</html>
