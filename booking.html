<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(13, 110, 253, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            position: relative;
        }

        .navbar a::after {
            content: "";
            position: absolute;
            width: 0;
            height: 2px;
            background: white;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        .navbar a:hover::after {
            width: 100%;
        }

    .section-title {
      text-align: center;
      font-size: 36px;
      margin: 60px 0 30px;
      color: #0d6efd;
    }

    .rooms-cinematic {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 0 30px 60px;
    }

    .room-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      transition: transform 0.4s, box-shadow 0.4s;
    }

    .room-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
    }

    .room-img {
      overflow: hidden;
    }

    .room-img img {
      width: 100%;
      height: 230px;
      object-fit: cover;
      transition: transform 0.6s;
    }

    .room-card:hover img {
      transform: scale(1.1);
    }

    .room-info {
      padding: 25px;
      text-align: center;
    }

    .room-info h3 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .price {
      font-size: 20px;
      color: #0d6efd;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .price span {
      font-size: 14px;
      color: #555;
    }

    .room-btn {
      padding: 12px 30px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #0d6efd, #00c6ff);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .room-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }
    /* Tablet (<= 768px) */
@media (max-width: 768px) {

  .navbar {
    flex-wrap: wrap;
    gap: 15px;
    padding: 10px;
  }

  .navbar a {
    font-size: 14px;
  }

  .section-title {
    font-size: 28px;
    margin: 40px 0 20px;
  }

  .rooms-cinematic {
    grid-template-columns: repeat(2, 1fr);
    padding: 0 15px 40px;
  }

  .room-img img {
    height: 200px;
  }

  .room-info {
    padding: 20px;
  }

  .room-info h3 {
    font-size: 20px;
  }

  .price {
    font-size: 18px;
  }

  .room-btn {
    padding: 10px 25px;
    font-size: 14px;
  }
}
/* Mobile (<= 480px) */
@media (max-width: 480px) {

  .navbar {
    flex-direction: column;
    align-items: center;
  }

  .navbar a {
    display: block;
    padding: 5px 0;
  }

  .section-title {
    font-size: 22px;
  }

  .rooms-cinematic {
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .room-img img {
    height: 180px;
  }

  .room-info {
    padding: 15px;
  }

  .room-info h3 {
    font-size: 18px;
  }

  .price {
    font-size: 16px;
  }

  .room-btn {
    width: 100%;
  }
}
