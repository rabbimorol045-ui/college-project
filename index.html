<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Hotel Management System</title>
    <style>
        /* HERO HEADER */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url("https://picsum.photos/1600/900?hotel,luxury");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-content h1 {
            font-size: 52px;
            color: white;
            animation: fadeDown 1.2s ease;
        }

        .hero-content p {
            color: #ddd;
            font-size: 20px;
            margin-top: 10px;
        }

        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(13, 110, 253, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            position: relative;
        }

        .navbar a::after {
            content: "";
            position: absolute;
            width: 0;
            height: 2px;
            background: white;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        .navbar a:hover::after {
            width: 100%;
        }

        /* ABOUT SECTION */
        .container {
            padding: 80px 20px;
            display: flex;
            justify-content: center;
        }

        .about-card {
            max-width: 700px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: fadeUp 1.2s ease;
        }

        .about-card h2 {
            color: #0d6efd;
            margin-bottom: 15px;
        }

        /* FOOTER */
        .footer {
            background: #111;
            color: #bbb;
            text-align: center;
            padding: 20px;
        }

        /* ANIMATIONS */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
